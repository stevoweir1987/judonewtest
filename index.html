<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e5e2e1;
    font-family: Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    min-height: 100dvh;
    overflow: hidden;
  }
  #app-shell {
    width: 100%;
    max-width: 430px;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    background: #131313;
    flex-shrink: 0;
  }
  .ms { font-family: 'Material Symbols Outlined'; font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .ms-fill { font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
  .glass { background: rgba(44,44,46,0.45); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.07); }
  .glass-low { background: rgba(28,27,27,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
  .gold-glow { box-shadow: 0 0 24px rgba(242,202,80,0.12); }
  .hide-scroll::-webkit-scrollbar { display:none; }
  .hide-scroll { -ms-overflow-style:none; scrollbar-width:none; }
  .active-scale:active { transform: scale(0.97); transition: transform 0.1s ease; }
  /* Screens */
  .screen { display:none; position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; -ms-overflow-style:none; }
  .screen::-webkit-scrollbar { display:none; }
  #app-shell { scrollbar-width:none; }
  #app-shell::-webkit-scrollbar { display:none; }
  .screen.active { display:block; }
  /* Belt colours */
  .belt-red    { background:#dc2626; color:#fff; }
  .belt-yellow { background:#eab308; color:#000; }
  .belt-orange { background:#f97316; color:#fff; }
  .belt-green  { background:#16a34a; color:#fff; }
  .belt-blue   { background:#2563eb; color:#fff; }
  .belt-brown  { background:#92400e; color:#fff; }
  .belt-black  { background:#111; color:#fff; border:1px solid #555; }
  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeout { 0%,80%{opacity:1;pointer-events:auto} 100%{opacity:0;pointer-events:none} }
  #app-loading { animation: fadeout 0.4s ease 4s forwards; }
  /* Nav */
  #app-nav .nav-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; flex:1; padding:10px 4px 8px; cursor:pointer; transition:color 0.15s; color:rgba(229,226,225,0.4); font-size:9px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; }
  #app-nav .nav-btn.active { color:#f2ca50; }
  #app-nav .nav-btn .ms { font-size:22px; }
  /* Hero gradient */
  .hero-grad { background: linear-gradient(to bottom, rgba(19,19,19,0) 20%, rgba(19,19,19,1) 100%); }
  /* Card grid */
  .hub-card { background: #1c1b1b; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; overflow:hidden; cursor:pointer; transition: all 0.15s; }
  .hub-card:active { transform: scale(0.96); background: #242424; }
  /* Onboarding */
  #screen-onboarding { background: linear-gradient(180deg, #0e0e0e 0%, #1a1500 100%); }
  /* Search */
  .search-input { background: #1c1b1b; border: 1px solid rgba(255,255,255,0.08); color: #e5e2e1; border-radius: 12px; padding: 12px 16px 12px 44px; width:100%; font-size:14px; outline:none; }

<script>
// ══════════════════════════════════════════════
//  Router
// ══════════════════════════════════════════════
const SCREENS   = ['onboarding','home','browse','hub','card','grade','drills','profile'];
const NAV_TABS  = ['home','browse','grade','drills','profile'];
const FOCUS     = ['hub','card'];           // hide nav/header back btn
const BACK_MAP  = { hub:'browse', card:'hub' };

const JHRouter = (() => {
  let _current  = 'onboarding';
  let _previous = 'home';

  function go(name, opts) {
    opts = opts || {};
    if (name === _current) return;
    _previous = _current;
    _current  = name;

    // Show/hide screens
    SCREENS.forEach(id => {
      const el = document.getElementById('screen-' + id);
      if (el) el.classList.toggle('active', id === name);
    });

    // Scroll to top
    const sc = document.getElementById('screen-' + name);
    if (sc) sc.scrollTo({ top:0, behavior:'instant' });

    // Header
    const hdr  = document.getElementById('app-header');
    const back = document.getElementById('header-back');
    const title= document.getElementById('header-title');
    const act  = document.getElementById('header-action');
    const nav  = document.getElementById('app-nav');
    const isFocus = FOCUS.includes(name);

    if (name === 'onboarding') {
      hdr.classList.add('hidden');
      nav.classList.add('hidden');
    } else {
      hdr.classList.remove('hidden');
      nav.classList.toggle('hidden', isFocus);
      // Back button
      if (isFocus) {
        back.style.display = 'flex'; back.classList.remove('hidden');
        title.style.display = 'none';
      } else {
        back.style.display = 'none';
        title.style.display = 'block';
        title.textContent = 'JUDOHUB';
      }
    }

    // Nav highlight
    document.querySelectorAll('#app-nav .nav-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.screen === name);
    });

    // On-enter hooks
    if (name === 'home')    JHHome.render();
    if (name === 'browse')  JHBrowse.render();
    if (name === 'hub' && opts.technique) JHHub.open(opts.technique);
    if (name === 'card' && opts.card)     JHHub.openCard(opts.card);
    if (name === 'grade')   JHGrade.render();
    if (name === 'drills')  JHDrills.render();
    if (name === 'profile') JHProfile.render();
  }

  function back() { go(BACK_MAP[_current] || 'home'); }
  function current() { return _current; }
  function previous() { return _previous; }

  return { go, back, current, previous };
})();

// ══════════════════════════════════════════════
//  Onboarding
// ══════════════════════════════════════════════
const JHOnboarding = (() => {
  const BELTS = [
    { id:'red',    label:'Red',    color:'#dc2626' },
    { id:'yellow', label:'Yellow', color:'#eab308' },
    { id:'orange', label:'Orange', color:'#f97316' },
    { id:'green',  label:'Green',  color:'#16a34a' },
    { id:'blue',   label:'Blue',   color:'#2563eb' },
    { id:'brown',  label:'Brown',  color:'#92400e' },
  ];
  let _belt = 'red';

  function init() {
    const container = document.getElementById('ob-belts');
    if (!container) return;
    container.innerHTML = BELTS.map(b => `
      <button onclick="JHOnboarding.selectBelt('${b.id}')"
        id="ob-belt-${b.id}"
        class="py-2 rounded-xl font-jakarta font-bold active-scale"
        style="font-size:11px;background:${b.color}22;border:1.5px solid ${b.color}55;color:${b.color}">
        ${b.label}
      </button>`).join('');
    _highlight('red');
  }

  function selectBelt(id) { _belt = id; _highlight(id); }

  function _highlight(id) {
    BELTS.forEach(b => {
      const btn = document.getElementById('ob-belt-' + b.id);
      if (!btn) return;
      btn.style.border = `1.5px solid ${b.id === id ? b.color : b.color + '44'}`;
      btn.style.background = b.id === id ? b.color + '33' : b.color + '11';
    });
  }

  function save() {
    const name = (document.getElementById('ob-name') || {}).value.trim();
    if (!name) { document.getElementById('ob-name').focus(); return; }
    JHState.saveProfile({ name, belt: _belt });
    JHRouter.go('home');
  }

  return { init, selectBelt, save };
})();

// ══════════════════════════════════════════════
//  App Init
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  // Firebase
  try {
    await FirebaseSync.init();
    const cloud = await FirebaseSync.load();
    if (cloud) FirebaseSync.applyToLocalStorage(cloud);
  } catch(e) {
    console.warn('[JH] Firebase failed:', e.message);
  }

  // Hide loader
  const loader = document.getElementById('app-loading');
  if (loader) loader.style.display = 'none';

  // Route
  if (JHState.hasProfile()) {
    JHRouter.go('home');
  } else {
    JHOnboarding.init();
    // screen-onboarding already active
    document.getElementById('app-header').classList.add('hidden');
    document.getElementById('app-nav').classList.add('hidden');
  }

  // Flush on hide
  window.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') FirebaseSync.flushNow();
  });
});

// ── Drag-to-scroll for horizontal lists (desktop) ──
document.addEventListener('DOMContentLoaded', () => {
  function enableDragScroll(el) {
    let isDown = false, startX, scrollLeft;
    el.addEventListener('mousedown', e => { isDown = true; el.classList.add('dragging'); startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; });
    el.addEventListener('mouseleave', () => { isDown = false; el.classList.remove('dragging'); });
    el.addEventListener('mouseup', () => { isDown = false; el.classList.remove('dragging'); });
    el.addEventListener('mousemove', e => { if (!isDown) return; e.preventDefault(); const x = e.pageX - el.offsetLeft; el.scrollLeft = scrollLeft - (x - startX); });
  }
  document.querySelectorAll('.h-scroll').forEach(enableDragScroll);
  // Re-apply after renders (MutationObserver on app-shell)
  new MutationObserver(() => document.querySelectorAll('.h-scroll:not(.drag-ready)').forEach(el => { el.classList.add('drag-ready'); enableDragScroll(el); })).observe(document.getElementById('app-shell'), { childList:true, subtree:true });
});
</script>

<!-- ── Swipe Card Overlay ──────────────────────── -->

  <div id="swipe-topbar" style="position:absolute;top:0;left:0;right:0;z-index:10;padding:env(safe-area-inset-top,0) 16px 0;height:56px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(14,14,14,0.9),transparent)">
    <button onclick="JHHub.closeCards()" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center">
      <span class="ms" style="color:#e5e2e1;font-size:18px">close</span>
    </button>
    <div id="swipe-dots" style="display:flex;gap:6px;align-items:center"></div>
    <div id="swipe-counter" style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:11px;color:rgba(229,226,225,0.4)"></div>
  </div>
  <!-- Card track -->
